<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Manantial de Vida</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--s1:#0d1117;--s2:#131720;--s3:#1a2030;--s4:#222840;
  --bd:#ffffff10;--bd2:#ffffff1a;--bd3:#ffffff28;
  --t1:#eef0ff;--t2:#8890b8;--t3:#4a5278;
  --ac:#5b8dff;--acb:rgba(91,141,255,.12);
  --gr:#34d399;--grb:rgba(52,211,153,.12);
  --rd:#f87171;--rdb:rgba(248,113,113,.12);
  --am:#fbbf24;--amb:rgba(251,191,36,.12);
  --pu:#a78bfa;--pub:rgba(167,139,250,.12);
  --r8:8px;--r12:12px;--r16:16px;
  --font:'Plus Jakarta Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);font-size:14px;line-height:1.55;min-height:100vh}
input,select{font-family:var(--font);font-size:14px;background:var(--s3);border:1.5px solid var(--bd2);color:var(--t1);border-radius:var(--r8);padding:11px 14px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(91,141,255,.15)}
input::placeholder{color:var(--t3)}
select option{background:var(--s2)}
button{font-family:var(--font);cursor:pointer;border:none;border-radius:var(--r8);font-size:13px;font-weight:600;transition:all .15s}
.btn{padding:9px 16px;background:var(--s3);color:var(--t2);border:1.5px solid var(--bd2)}
.btn:hover{background:var(--s4);color:var(--t1)}
.bp{background:var(--ac);color:#fff;padding:11px 20px;font-size:14px;box-shadow:0 4px 16px rgba(91,141,255,.35)}
.bp:hover{filter:brightness(1.1);transform:translateY(-1px)}
.bg2{background:var(--grb);color:var(--gr);border:1.5px solid rgba(52,211,153,.3)}
.br{background:var(--rdb);color:var(--rd);border:1.5px solid rgba(248,113,113,.3);padding:5px 10px;font-size:11px}
.bw{background:var(--amb);color:var(--am);border:1.5px solid rgba(251,191,36,.3)}
.bsm{padding:6px 12px;font-size:12px}
.lbl{font-size:11px;color:var(--t3);display:block;margin-bottom:5px;margin-top:14px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.lbl:first-child{margin-top:0}
.card{background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--r16);padding:1.25rem}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem;margin-bottom:1rem}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.met{background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r12);padding:1rem;position:relative;overflow:hidden}
.met::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.mac::after{background:var(--ac)}.mgr::after{background:var(--gr)}.mrd::after{background:var(--rd)}.mam::after{background:var(--am)}.mpu::after{background:var(--pu)}
.ml{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.mv{font-size:22px;font-weight:700;letter-spacing:-.4px}
.mac .mv{color:var(--ac)}.mgr .mv{color:var(--gr)}.mrd .mv{color:var(--rd)}.mam .mv{color:var(--am)}.mpu .mv{color:var(--pu)}
.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.cg{background:var(--grb);color:var(--gr)}.cr{background:var(--rdb);color:var(--rd)}
.ca{background:var(--amb);color:var(--am)}.cs{background:var(--s4);color:var(--t2)}
.cb{background:var(--acb);color:var(--ac)}.cp{background:var(--pub);color:var(--pu)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;color:var(--t3);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.07em;border-bottom:1.5px solid var(--bd)}
td{padding:10px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
.ri{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}
.ri:last-child{border-bottom:none}
.empty{text-align:center;padding:2.5rem;color:var(--t3);font-size:13px}
.tip{background:var(--acb);border:1.5px solid rgba(91,141,255,.2);border-radius:var(--r8);padding:.75rem 1rem;font-size:13px;color:var(--ac);margin-bottom:1rem}
.tipw{background:var(--amb);border-color:rgba(251,191,36,.25);color:var(--am)}
.tipg{background:var(--grb);border-color:rgba(52,211,153,.25);color:var(--gr)}
.tipr{background:var(--rdb);border-color:rgba(248,113,113,.25);color:var(--rd)}
.srch{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.srch input,.srch select{margin:0}
.srch input{flex:1}
.resi{padding:10px 12px;border-radius:var(--r8);border:1.5px solid var(--bd2);cursor:pointer;margin-bottom:6px;background:var(--s2);transition:all .15s}
.resi:hover{border-color:var(--ac);background:var(--s3)}
.prog{height:4px;background:var(--s4);border-radius:2px;overflow:hidden;margin-top:6px}
.pf{height:100%;background:var(--ac);border-radius:2px}
.st{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.divl{height:1px;background:var(--bd);margin:1rem 0}
/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;
  background:radial-gradient(ellipse 60% 50% at 20% 60%,rgba(91,141,255,.07) 0%,transparent 100%),
             radial-gradient(ellipse 50% 40% at 80% 20%,rgba(167,139,250,.05) 0%,transparent 100%)}
.lbox{width:100%;max-width:400px}
.llogo{text-align:center;margin-bottom:2rem}
.llogo img{max-height:80px;max-width:180px;object-fit:contain}
.ltitle{font-size:20px;font-weight:700;margin-top:.75rem;letter-spacing:-.3px}
.lsub{font-size:12px;color:var(--t3);font-style:italic;margin-top:3px}
.ucard{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--s2);border:1.5px solid var(--bd2);border-radius:var(--r12);margin-bottom:8px;cursor:pointer;text-align:left;width:100%;color:var(--t1);font-family:var(--font);transition:all .2s}
.ucard:hover{border-color:var(--ac);background:var(--s3);transform:translateX(4px)}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.ava{background:var(--amb);color:#78350f}.avb{background:var(--acb);color:var(--ac)}.avc{background:var(--grb);color:#064e3b}
.pinsec{margin-top:1rem;background:var(--s2);border:1.5px solid var(--bd2);border-radius:var(--r12);padding:1.25rem;display:none}
.pdots{display:flex;gap:12px;justify-content:center;margin:1rem 0}
.pd{width:14px;height:14px;border-radius:50%;background:var(--s4);border:2px solid var(--bd2);transition:all .2s}
.pd.on{background:var(--ac);border-color:var(--ac);box-shadow:0 0 10px rgba(91,141,255,.6)}
.pkeys{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:.75rem}
.pk{padding:14px;font-size:18px;font-weight:700;background:var(--s3);border:1.5px solid var(--bd2);border-radius:var(--r8);cursor:pointer;color:var(--t1);font-family:var(--font);transition:all .15s}
.pk:hover{background:var(--s4);border-color:var(--bd3)}
.pk:active{transform:scale(.93)}
.pkdel{color:var(--rd);font-size:16px}
.pkent{background:var(--ac);border-color:var(--ac);color:#fff;box-shadow:0 4px 14px rgba(91,141,255,.4)}
.pkent:hover{filter:brightness(1.1)}
/* SIDEBAR */
#main{display:none;min-height:100vh}
.sb{width:230px;background:var(--s1);border-right:1.5px solid var(--bd);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sblogo{padding:1.1rem 1.25rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sblogo img{height:30px;width:auto;object-fit:contain}
.sblogo .sbn{font-size:12px;font-weight:700;line-height:1.3}
.sblogo .sbs{font-size:10px;color:var(--t3);font-style:italic}
.sbuser{padding:.75rem 1rem;background:var(--s2);margin:.75rem;border-radius:var(--r12);border:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sbuser .un{font-size:13px;font-weight:600}.sbuser .ur{font-size:11px;color:var(--t3)}
.navg{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;padding:8px 1.25rem 4px;margin-top:4px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 1.25rem;color:var(--t2);cursor:pointer;font-size:13px;font-weight:600;width:100%;text-align:left;background:none;border:none;font-family:var(--font);transition:all .15s;margin:1px 0}
.ni svg{width:15px;height:15px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ni:hover{color:var(--t1);background:var(--s2)}
.ni.on{color:var(--ac);background:var(--acb)}
.sbbot{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid var(--bd)}
.lo{display:flex;align-items:center;gap:8px;color:var(--t3);cursor:pointer;font-size:12px;font-weight:600;background:none;border:none;font-family:var(--font);padding:8px 10px;border-radius:var(--r8);width:100%;transition:all .15s}
.lo:hover{color:var(--rd);background:var(--rdb)}
.lo svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mc{margin-left:230px;padding:1.75rem;min-height:100vh}
.ph{margin-bottom:1.75rem}
.ph h1{font-size:22px;font-weight:700;letter-spacing:-.4px}
.ph p{font-size:13px;color:var(--t2);margin-top:4px}
.page{display:none}.page.on{display:block}
/* DOCUMENTO IMPRIMIBLE */
.docwrap{background:rgba(0,0,0,.6);min-height:520px;display:flex;align-items:flex-start;justify-content:center;padding:2rem;border-radius:var(--r16);margin-top:1rem;border:1px solid var(--bd)}
.docbox{background:#fff;color:#111;width:100%;max-width:420px;border-radius:12px;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif}
.doch{background:linear-gradient(135deg,#002d5a,#0050a0);padding:1rem 1.5rem;display:flex;align-items:center;gap:12px}
.doch img{height:46px;background:#fff;border-radius:6px;padding:4px;object-fit:contain}
.doch .dhn{font-size:15px;font-weight:700;color:#fff}
.doch .dhs{font-size:11px;color:rgba(255,255,255,.6);font-style:italic;margin-top:1px}
.docbody{padding:1.2rem 1.5rem}
.docnum{text-align:center;padding-bottom:1rem;border-bottom:2px dashed #e0e0e0;margin-bottom:1rem}
.docnum .dn{font-size:26px;font-weight:800;color:#002d5a;letter-spacing:-1px}
.docnum .dl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:2px;margin-bottom:2px}
.docnum .dtype{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:6px}
.dtype-fac{background:#e8f5e9;color:#1b5e20}
.dtype-rec{background:#e3f2fd;color:#0d47a1}
.docamt{background:#f0f6ff;border:1px solid #c8dbf5;border-radius:10px;padding:1rem;text-align:center;margin:1rem 0}
.docamt .dv{font-size:25px;font-weight:800;color:#002d5a}
.docamt .dw{font-size:11px;color:#667;margin-top:3px;font-style:italic}
.docrow{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #f0f0f0}
.docrow:last-child{border-bottom:none}
.docrow .k{color:#777}.docrow .v{font-weight:600;color:#111;text-align:right;max-width:58%}
.docfir{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:1.5rem}
.docfir .fb{text-align:center;border-top:1px solid #ccc;padding-top:6px;font-size:11px;color:#777}
.docfoo{background:#f4f8ff;border-top:2px dashed #dce8f8;padding:.8rem 1.5rem;text-align:center;font-size:11px;color:#8899bb}
.docact{display:flex;gap:.75rem;padding:1rem 1.5rem;background:#edf3ff;border-top:1px solid #d4e4f8}
.docact button{flex:1;padding:10px;border-radius:8px;border:1px solid #c0d4ee;background:#fff;cursor:pointer;font-size:13px;font-weight:700;color:#002d5a;font-family:inherit;transition:all .15s}
.docact button:hover{background:#e8f0fe}
.docact .dp{background:#002d5a;color:#fff;border-color:#002d5a}
.docact .dp:hover{background:#0050a0}
@media print{
  body>*{display:none!important}
  #pzone{display:block!important;position:fixed;inset:0;background:#fff;z-index:9999}
  #pzone .docact{display:none!important}
  #pzone .docwrap{background:#fff;border:none;padding:0;min-height:auto}
  #pzone .docbox{max-width:100%;border-radius:0;box-shadow:none}
}
@media(max-width:768px){.sb{transform:translateX(-100%);transition:.25s}.sb.open{transform:translateX(0)}.mc{margin-left:0}.mob{display:flex!important}}
.mob{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--s2);border:1.5px solid var(--bd2);border-radius:var(--r8);padding:9px 11px;cursor:pointer;color:var(--t1);font-size:17px;align-items:center}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99}
</style>
</head>

function C$(n){return "C$ "+Number(n||0).toLocaleString("es-NI",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fD(d){if(!d)return"";var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function fT(f){return f==7?"semanal":f==15?"quincenal":"mensual";}
function cobCtr(id){return db.cobros.filter(function(c){return c.contrato===id;}).reduce(function(s,c){return s+c.monto;},0);}
function sldo(c){return Math.max(0,c.monto-cobCtr(c.id));}
function proxF(c){var p=Math.floor(cobCtr(c.id)/c.cuota);var d=new Date(c.fecha);d.setDate(d.getDate()+p*parseInt(c.freq));return d.toISOString().split("T")[0];}
function estC(c){if(c.estado==="cancelado")return"cancelado";if(sldo(c)<=0)return"cancelado";if(proxF(c)<HOY)return"vencido";return"activo";}
function misCtr(){if(ses&&ses.r==="vendedor")return db.contratos.filter(function(c){return c.vendedor===ses.n;});return db.contratos;}
function nlNum(n){
  var u=["","uno","dos","tres","cuatro","cinco","seis","siete","ocho","nueve","diez","once","doce","trece","catorce","quince","dieciseis","diecisiete","dieciocho","diecinueve","veinte"];
  n=Math.round(n);if(n===0)return"cero";if(n<=20)return u[n];
  if(n<100){var d=["","","veinti","treinta","cuarenta","cincuenta","sesenta","setenta","ochenta","noventa"];return d[Math.floor(n/10)]+(n%10?(n<30?u[n%10]:" y "+u[n%10]):"");}
  if(n===100)return"cien";
  if(n<1000){var cc=["","ciento","doscientos","trescientos","cuatrocientos","quinientos","seiscientos","setecientos","ochocientos","novecientos"];return cc[Math.floor(n/100)]+(n%100?" "+nlNum(n%100):"");}
  if(n<2000)return"mil"+(n%1000?" "+nlNum(n%1000):"");
  if(n<1000000)return nlNum(Math.floor(n/1000))+" mil"+(n%1000?" "+nlNum(n%1000):"");
  return n.toString();
}
function enLetras(n){return nlNum(Math.floor(n))+" cordobas con "+String(Math.round((n%1)*100)).padStart(2,"0")+"/100";}

/* ===== LOGIN ===== */
var ses=null, psel=null, pval="";
function initLogin(){
  var h="";
  for(var i=0;i<USERS.length;i++){
    var u=USERS[i];
    h+='<button class="ucard" data-uid="'+u.id+'">';
    h+='<div class="av '+u.ac+'">'+u.av+'</div>';
    h+='<div><div style="font-weight:600;font-size:14px">'+u.n+'</div>';
    h+='<div style="font-size:12px;color:var(--t3)">'+u.rl+'</div></div></button>';
  }
  document.getElementById("ucards").innerHTML=h;
  document.querySelectorAll(".ucard").forEach(function(btn){
    btn.addEventListener("click",function(){
      var uid=this.getAttribute("data-uid");
      psel=null;
      for(var j=0;j<USERS.length;j++){if(USERS[j].id===uid){psel=USERS[j];break;}}
      pval="";
      document.querySelectorAll(".ucard").forEach(function(c){c.classList.remove("sel");});
      this.classList.add("sel");
      document.getElementById("psec").style.display="block";
      document.getElementById("pwho").textContent=psel.n;
      document.getElementById("perr").style.display="none";
      updDots();
    });
  });
  for(var n=0;n<=9;n++){
    (function(num){document.getElementById("pk"+num).addEventListener("click",function(){pk(num);});})(n);
  }
  document.getElementById("pkdel").addEventListener("click",function(){pval=pval.slice(0,-1);updDots();});
  document.getElementById("pkent").addEventListener("click",penter);
  document.getElementById("pkcnl").addEventListener("click",function(){
    psel=null;pval="";document.getElementById("psec").style.display="none";
    document.querySelectorAll(".ucard").forEach(function(c){c.classList.remove("sel");});updDots();
  });
}
function pk(n){if(pval.length>=4)return;pval+=String(n);updDots();document.getElementById("perr").style.display="none";if(pval.length===4)setTimeout(penter,200);}
function updDots(){for(var i=0;i<4;i++)document.getElementById("d"+i).classList.toggle("on",i<pval.length);}
function penter(){
  if(!psel)return;
  if(pval===psel.pin){ses=psel;document.getElementById("login").style.display="none";document.getElementById("main").style.display="block";initMain();}
  else{document.getElementById("perr").style.display="block";pval="";updDots();}
}
document.addEventListener("keydown",function(e){
  if(!psel||document.getElementById("psec").style.display==="none")return;
  if(e.key>="0"&&e.key<="9")pk(parseInt(e.key));
  else if(e.key==="Backspace"){pval=pval.slice(0,-1);updDots();}
  else if(e.key==="Enter")penter();
});

function initMain(){
  document.getElementById("sbname").textContent=ses.n;
  document.getElementById("sbrole").textContent=ses.rl;
  var av=document.getElementById("sbav");av.textContent=ses.av;av.className="av "+ses.ac;
  var perm=PERMS[ses.r];
  var prevG="",nav="";
  for(var i=0;i<NAVS.length;i++){
    var nv=NAVS[i];if(!perm.includes(nv.id))continue;
    if(nv.g!==prevG){nav+='<div class="navg">'+nv.g+'</div>';prevG=nv.g;}
    nav+='<button class="ni" id="ni_'+nv.id+'" data-page="'+nv.id+'">';
    nav+='<svg viewBox="0 0 24 24"><path d="'+nv.d+'"/></svg>'+nv.lbl+'</button>';
  }
  document.getElementById("sbnav").innerHTML=nav;
  document.querySelectorAll(".ni").forEach(function(b){b.addEventListener("click",function(){goTo(this.getAttribute("data-page"));});});
  document.getElementById("lobtn").addEventListener("click",logout);
  document.getElementById("mobbtn").addEventListener("click",function(){document.getElementById("sb").classList.add("open");document.getElementById("ov").style.display="block";});
  document.getElementById("ov").addEventListener("click",closeSB);
  goTo("inicio");
}
function goTo(p){
  document.querySelectorAll(".page").forEach(function(x){x.classList.remove("on");});
  document.querySelectorAll(".ni").forEach(function(x){x.classList.remove("on");});
  document.getElementById("pg-"+p).classList.add("on");
  var ni=document.getElementById("ni_"+p);if(ni)ni.classList.add("on");
  closeSB();
  var fn={inicio:rInicio,cobrar:rCobrar,recibos:rRecibos,inventario:rInv,contratos:rCtrs,gastos:rGastos,planilla:rPlanilla,reportes:rReportes};
  if(fn[p])fn[p]();
}

function showDoc(cfg, zonaId){
  lastDocHtml=docHtml(cfg);
  var zona=document.getElementById(zonaId);
  if(!zona)return;
  zona.style.display="block";
  zona.innerHTML=lastDocHtml;
  setTimeout(function(){
    var bp=document.getElementById("docbtnprint");
    var bc=document.getElementById("docbtnclose");
    if(bp)bp.addEventListener("click",printDoc);
    if(bc)bc.addEventListener("click",function(){zona.style.display="none";zona.innerHTML="";});
  },50);
  zona.scrollIntoView({behavior:"smooth",block:"start"});
}
function printDoc(){
  var pz=document.getElementById("pzone");
  pz.style.display="block";
  pz.innerHTML=lastDocHtml;
  window.onafterprint=function(){pz.style.display="none";pz.innerHTML="";window.onafterprint=null;};
  setTimeout(function(){window.print();},120);
}
function bindDocBtns(pgid){
  document.querySelectorAll("#"+pgid+" [data-cobid]").forEach(function(b){
    b.addEventListener("click",function(){
      var id=parseInt(this.getAttribute("data-cobid"));
      var zona=document.getElementById("dzone2")||document.getElementById("dzone");
      if(!zona)return;
      var c=db.cobros.find(function(x){return x.id===id;});
      if(!c)return;
      var sd=Math.max(0,c.saldoA-c.monto);
      showDoc({
        tipo:"recibo",numero:c.nr,fecha:c.fecha,monto:c.monto,
        filas:[
          ["Recibido de:",c.nombre],
          ["Direccion:",(c.dir||"—")],
          ["Concepto:",(c.producto||"Cuota de contrato")],
          ["N&#176; contrato:","#"+c.contrato],
          ["Forma de pago:",c.forma],
          ["Saldo anterior:",C$(c.saldoA)],
          ["Saldo despues:",C$(sd)+(sd<=0?" (PAGADO)":"")],
          (c.descuento&&c.descuento>0?["Descuento aplicado:",C$(c.descuento)]:[]),
          (c.obs?["Nota:",c.obs]:[]),
          ["Atendido por:",(c.por||"—")]
        ].filter(function(f){return f.length>0;})
      }, zona.id);
    });
  });
}

function prevC(){
  var m=parseFloat((document.getElementById("ctm")||{}).value)||0;
  var p=parseFloat((document.getElementById("ctpr")||{}).value)||0;
  var d=parseFloat((document.getElementById("ctdesc")||{}).value)||0;

  var f=parseInt((document.getElementById("ctfr")||{}).value)||30;

function gCtr(){

  h+='<div><div class="lbl">Pago por dia (C$)</div><input type="number" id="plsdia" placeholder="500" value="500"></div>';
  h+='<div><div class="lbl">Subsidio por dia (C$)</div><input type="number" id="plsubdia" placeholder="150" value="150"></div></div></div>';
  h+='<div class="lbl">Fecha de ingreso</div><input type="date" id="plf" value="'+HOY+'">';
  h+='<button class="bp" id="aempbtn" style="width:100%;margin-top:1rem">Agregar empleado</button></div></div>';
  document.getElementById("pg-planilla").innerHTML=h;
  document.getElementById("plc").addEventListener("change",function(){
    var isChofer=this.value==="chofer";
    document.getElementById("plsalwrap").style.display=isChofer?"none":"block";
    document.getElementById("plchoferwrap").style.display=isChofer?"block":"none";
  });
  document.getElementById("aempbtn").addEventListener("click",function(){
    var n=document.getElementById("pln").value.trim();if(!n){alert("Ingresa el nombre");return;}
    var cargo=document.getElementById("plc").value;
    var emp={id:db.ne++,nombre:n,cargo:cargo,fecha:document.getElementById("plf").value||HOY};
    if(cargo==="chofer"){emp.salario=0;emp.salarioDia=parseFloat(document.getElementById("plsdia").value)||500;emp.subsidioDia=parseFloat(document.getElementById("plsubdia").value)||150;emp.diasMes=0;emp.diasSubsidio=0;}
    else{emp.salario=parseFloat(document.getElementById("pls").value)||0;}
    db.empleados.push(emp);SV();rPlanilla();
  });
  // Bind calcChofer buttons
  document.querySelectorAll("[data-action='calcChofer']").forEach(function(btn){
    btn.addEventListener("click",function(){
      var eid=parseInt(this.getAttribute("data-empid"));
      var emp=db.empleados.find(function(e){return e.id===eid;});if(!emp)return;
      var row=this.closest("tr");
      var diasLab=parseInt(row.querySelector("[data-field='diasMes']").value)||0;
      var diasSub=parseInt(row.querySelector("[data-field='diasSubsidio']").value)||0;
      emp.diasMes=diasLab;emp.diasSubsidio=diasSub;SV();rPlanilla();
    });
  });
}

/* ===== REPORTES ===== */
function rReportes(){
  var tv=db.contratos.reduce(function(s,c){return s+c.monto;},0);
  var tc=db.cobros.reduce(function(s,c){return s+c.monto;},0);
  var tg=db.gastos.reduce(function(s,g){return s+g.monto;},0);
  var tcom=db.contratos.reduce(function(s,c){return s+c.monto*0.12;},0);
  var comV={};db.contratos.forEach(function(c){comV[c.vendedor]=(comV[c.vendedor]||0)+c.monto*0.12;});
  var tpl=db.empleados.reduce(function(s,e){var com=e.cargo==="vendedor"?(comV[e.nombre]||0):0;var b=e.salario+com;return s+(b-b*0.07);},0);
  var util=tc-tg-tcom-tpl;
  var vInv=db.inventario.reduce(function(s,p){return s+p.stock*p.precio;},0);
  var h='<div class="ph"><h1>Reportes</h1><p>Estado general de Manantial de Vida</p></div>';
  h+='<div class="g4">';
  h+='<div class="met mac"><div class="ml">Total ventas</div><div class="mv">'+C$(tv)+'</div></div>';
  h+='<div class="met mgr"><div class="ml">Total cobrado</div><div class="mv">'+C$(tc)+'</div></div>';
  h+='<div class="met mrd"><div class="ml">Total gastos</div><div class="mv">'+C$(tg)+'</div></div>';
  h+='<div class="met mam"><div class="ml">Comisiones</div><div class="mv">'+C$(tcom)+'</div></div>';
  h+='<div class="met mpu"><div class="ml">Valor inventario</div><div class="mv">'+C$(vInv)+'</div></div>';
  h+='</div><div class="g2">';
  h+='<div class="card"><div class="st">Estado de cartera</div>';
  h+='<div class="ri"><span>Activos</span><span class="chip ca">'+db.contratos.filter(function(c){return estC(c)==="activo";}).length+'</span></div>';
  h+='<div class="ri"><span>Vencidos</span><span class="chip cr">'+db.contratos.filter(function(c){return estC(c)==="vencido";}).length+'</span></div>';
  h+='<div class="ri"><span>Pagados</span><span class="chip cs">'+db.contratos.filter(function(c){return estC(c)==="cancelado";}).length+'</span></div>';
  h+='<div class="ri" style="border:none"><span>Cartera pendiente</span><strong style="color:var(--am)">'+C$(db.contratos.reduce(function(s,c){return s+sldo(c);},0))+'</strong></div></div>';
  h+='<div class="card"><div class="st">Comisiones por vendedor</div>';
  var hasV=false;
  for(var v in comV){if(comV[v]>0){h+='<div class="ri"><span style="font-weight:600">'+v+'</span><span style="color:var(--gr);font-weight:700">'+C$(comV[v])+'</span></div>';hasV=true;}}
  if(!hasV)h+='<div class="empty">Sin datos</div>';
  h+='<div class="divl"></div><div class="st">Exportar datos</div>';
  h+='<div style="display:flex;gap:.5rem;flex-wrap:wrap">';
  h+='<button class="btn bw bsm" id="excobbtn">Cobros Excel</button>';
  h+='<button class="btn bw bsm" id="exctrs2btn">Contratos Excel</button></div></div></div>';
  h+='<div class="card"><div class="st">Resultado del negocio</div>';
  h+='<div class="ri"><span>Dinero cobrado</span><strong style="color:var(--gr)">'+C$(tc)+'</strong></div>';
  h+='<div class="ri"><span>Menos gastos</span><strong style="color:var(--rd)">- '+C$(tg)+'</strong></div>';
  h+='<div class="ri"><span>Menos comisiones</span><strong style="color:var(--rd)">- '+C$(tcom)+'</strong></div>';
  h+='<div class="ri"><span>Menos planilla neta</span><strong style="color:var(--rd)">- '+C$(tpl)+'</strong></div>';
  h+='<div style="border-top:1px solid var(--bd);margin-top:8px;padding-top:1rem;display:flex;justify-content:space-between;align-items:center">';
  h+='<span style="font-size:16px;font-weight:700">Ganancia / Perdida</span>';
  h+='<strong style="font-size:24px;color:'+(util>=0?'var(--gr)':'var(--rd)')+'">'+C$(util)+'</strong></div></div>';
  document.getElementById("pg-reportes").innerHTML=h;
  document.getElementById("excobbtn").addEventListener("click",exCobros);
  document.getElementById("exctrs2btn").addEventListener("click",exCtrs);
}
function exCobros(){
  var NL=String.fromCharCode(10);
  var csv="﻿"+"N Recibo,Fecha,N Contrato,Cliente,Monto,Descuento,Forma de Pago,Nota,Atendido Por"+NL;
  db.cobros.forEach(function(c){
    var row=[c.nr,fD(c.fecha),c.contrato,c.nombre,c.monto,c.descuento||0,c.forma,c.obs||"",c.por||""];
    csv+=row.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(",")+NL;
  });
  dlCSV(csv,"cobros_manantial.csv");
}

/* ===== UTILS ===== */
function dlCSV(csv,nombre){
  var b=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=nombre;a.click();
}


/* ===== EDITAR / ELIMINAR ===== */
function openModal(title, body, saveFn){
  document.getElementById("mtitle").textContent=title;
  document.getElementById("mbody").innerHTML=body;
  document.getElementById("emodal").style.display="flex";
  document.getElementById("msave").onclick=saveFn;
  document.getElementById("mclose").onclick=closeModal;
  document.getElementById("mcancel").onclick=closeModal;
}
function closeModal(){
  document.getElementById("emodal").style.display="none";
  document.getElementById("mbody").innerHTML="";
}

function editCtr(id){
  var c=db.contratos.find(function(x){return x.id===id;});if(!c)return;
  var vo="";
  db.empleados.filter(function(e){return e.cargo==="vendedor";}).forEach(function(e){
    vo+='<option'+(e.nombre===c.vendedor?' selected':'')+'>'+e.nombre+'</option>';
  });
  var no="";
  for(var i=1;i<=7;i++) no+='<option value="'+i+'"'+(c.ncuotas===i?' selected':'')+'>'+i+' cuota'+(i>1?'s':'')+'</option>';
  var fo=['<option value="7"'+(c.freq==7?' selected':'')+'>Semanal</option>',
          '<option value="15"'+(c.freq==15?' selected':'')+'>Quincenal</option>',
          '<option value="30"'+(c.freq==30?' selected':'')+'>Mensual</option>'].join('');
  var eo=['<option value="activo"'+(c.estado==="activo"?' selected':'')+'>Activo</option>',
          '<option value="cancelado"'+(c.estado==="cancelado"?' selected':'')+'>Cancelado (pagado)</option>',
          '<option value="mora"'+(c.estado==="mora"?' selected':'')+'>En mora</option>'].join('');
  var body=
    '<div class="lbl">Nombre del cliente</div><input type="text" id="ec_n" value="'+c.nombre+'">'+
    '<div class="lbl">Direccion</div><input type="text" id="ec_d" value="'+(c.dir||'')+'">'+
    '<div class="lbl">Telefono</div><input type="text" id="ec_t" value="'+(c.tel||'')+'">'+
    '<div class="lbl">Vendedor</div><select id="ec_v">'+vo+'</select>'+
    '<div class="lbl">Producto</div><input type="text" id="ec_p" value="'+(c.producto||'')+'">'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
    '<div><div class="lbl">Monto total (C$)</div><input type="number" id="ec_m" value="'+c.monto+'"></div>'+
    '<div><div class="lbl">Prima (C$)</div><input type="number" id="ec_pr" value="'+(c.prima||0)+'"></div></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">'+
    '<div><div class="lbl">Cuotas (max 7)</div><select id="ec_nc">'+no+'</select></div>'+
    '<div><div class="lbl">Frecuencia</div><select id="ec_fr">'+fo+'</select></div>'+
    '<div><div class="lbl">Fecha inicio</div><input type="date" id="ec_fi" value="'+c.fecha+'"></div></div>'+
    '<div class="lbl">Descuento (C$)</div><input type="number" id="ec_desc" value="'+(c.descuentoV||0)+'">'+
    '<div class="lbl">Estado</div><select id="ec_est">'+eo+'</select>';
  openModal('Editar contrato #'+id, body, function(){
    var m=parseFloat(document.getElementById('ec_m').value)||0;
    var pr=parseFloat(document.getElementById('ec_pr').value)||0;
    var desc=parseFloat(document.getElementById('ec_desc').value)||0;
    var nc=parseInt(document.getElementById('ec_nc').value)||1;
    var fr=parseInt(document.getElementById('ec_fr').value)||30;
    c.nombre=document.getElementById('ec_n').value.trim()||c.nombre;
    c.dir=document.getElementById('ec_d').value;
    c.tel=document.getElementById('ec_t').value;
    c.vendedor=document.getElementById('ec_v').value;
    c.producto=document.getElementById('ec_p').value;
    c.monto=m||c.monto;
    c.prima=pr;
    c.descuentoV=desc;
    c.ncuotas=nc;
    c.freq=fr;
    c.fecha=document.getElementById('ec_fi').value||c.fecha;
    c.estado=document.getElementById('ec_est').value;
    c.cuota=Math.round((c.monto-c.prima-c.descuentoV)/c.ncuotas*100)/100;
    SV();closeModal();fCtrs();
  });
}

function delCtr(id){
  var c=db.contratos.find(function(x){return x.id===id;});if(!c)return;
  if(!confirm('Eliminar contrato #'+id+' de '+c.nombre+'?\nTambien se eliminaran sus cobros registrados.'))return;
  db.contratos=db.contratos.filter(function(x){return x.id!==id;});
  db.cobros=db.cobros.filter(function(x){return x.contrato!==id;});
  SV();fCtrs();
}

function editCob(id){
  var c=db.cobros.find(function(x){return x.id===id;});if(!c)return;
  var fo=['<option'+(c.forma==="Efectivo"?' selected':'')+'>Efectivo</option>',
          '<option'+(c.forma==="Transferencia"?' selected':'')+'>Transferencia</option>',
          '<option'+(c.forma==="Tarjeta"?' selected':'')+'>Tarjeta</option>'].join('');
  var body=
    '<div class="tip" style="font-size:12px">Contrato #'+c.contrato+' · '+c.nombre+'</div>'+
    '<div class="lbl">Fecha del cobro</div><input type="date" id="ecob_f" value="'+c.fecha+'">'+
    '<div class="lbl">Monto recibido (C$)</div><input type="number" id="ecob_m" value="'+c.monto+'" style="font-size:18px;font-weight:700">'+
    '<div class="lbl">Descuento aplicado (C$)</div><input type="number" id="ecob_d" value="'+(c.descuento||0)+'">'+
    '<div class="lbl">Forma de pago</div><select id="ecob_frm">'+fo+'</select>'+
    '<div class="lbl">Nota</div><input type="text" id="ecob_obs" value="'+(c.obs||'')+'">'+
    '<div class="lbl">N&#176; Recibo</div><input type="text" id="ecob_nr" value="'+c.nr+'">';
  openModal('Editar cobro #'+c.nr, body, function(){
    c.fecha=document.getElementById('ecob_f').value||c.fecha;
    c.monto=parseFloat(document.getElementById('ecob_m').value)||c.monto;
    c.descuento=parseFloat(document.getElementById('ecob_d').value)||0;
    c.forma=document.getElementById('ecob_frm').value;
    c.obs=document.getElementById('ecob_obs').value;
    c.nr=document.getElementById('ecob_nr').value||c.nr;
    SV();closeModal();
    var pg=document.querySelector('.page.on');
    if(pg&&pg.id==='pg-cobrar')rCobrar();
    else if(pg&&pg.id==='pg-recibos')rRecibos();
    else if(pg&&pg.id==='pg-inicio')rInicio();
  });
}

function delCob(id){
  var c=db.cobros.find(function(x){return x.id===id;});if(!c)return;
  if(!confirm('Eliminar cobro #'+c.nr+' de '+c.nombre+' ('+C$(c.monto)+')?'))return;
  db.cobros=db.cobros.filter(function(x){return x.id!==id;});
  SV();
  var pg=document.querySelector('.page.on');
  if(pg&&pg.id==='pg-cobrar')rCobrar();
  else if(pg&&pg.id==='pg-recibos')rRecibos();
  else if(pg&&pg.id==='pg-inicio')rInicio();
}



function editProd(id){
  var p=db.inventario.find(function(x){return x.id===id;});if(!p)return;
  var catOpts=[
    '<option value="filtros"'+(p.cat==="filtros"?' selected':'')+'>Filtros purificadores</option>',
    '<option value="biblias"'+(p.cat==="biblias"?' selected':'')+'>Biblias</option>',
    '<option value="repuestos"'+(p.cat==="repuestos"?' selected':'')+'>Repuestos</option>',
    '<option value="otros"'+(p.cat==="otros"?' selected':'')+'>Otros</option>'
  ].join('');
  var body=
    '<div class="lbl">Nombre del producto</div><input type="text" id="ep_n" value="'+p.nombre+'">'+
    '<div class="lbl">Categoria</div><select id="ep_cat">'+catOpts+'</select>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
    '<div><div class="lbl">Precio de venta (C$)</div><input type="number" id="ep_pv" value="'+p.precio+'"></div>'+
    '<div><div class="lbl">Costo (C$)</div><input type="number" id="ep_co" value="'+p.costo+'"></div></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
    '<div><div class="lbl">Stock actual</div><input type="number" id="ep_st" value="'+p.stock+'"></div>'+
    '<div><div class="lbl">Alerta cuando baje a</div><input type="number" id="ep_al" value="'+p.alerta+'"></div></div>';
  openModal('Editar producto', body, function(){
    p.nombre=document.getElementById('ep_n').value.trim()||p.nombre;
    p.cat=document.getElementById('ep_cat').value;
    p.precio=parseFloat(document.getElementById('ep_pv').value)||p.precio;
    p.costo=parseFloat(document.getElementById('ep_co').value)||p.costo;
    p.stock=parseInt(document.getElementById('ep_st').value)||0;
    p.alerta=parseInt(document.getElementById('ep_al').value)||5;
    SV();closeModal();rInv();
  });
}

function delProd(id){
  var p=db.inventario.find(function(x){return x.id===id;});if(!p)return;
  if(!confirm('Eliminar "'+p.nombre+'" del inventario?'))return;
  db.inventario=db.inventario.filter(function(x){return x.id!==id;});
  SV();rInv();
}

function bindEditCobBtns(pgid){
  document.querySelectorAll('#'+pgid+' [data-editcob]').forEach(function(b){

  });
  document.querySelectorAll('#'+pgid+' [data-delcob]').forEach(function(b){
    b.addEventListener('click',function(){delCob(parseInt(this.getAttribute('data-delcob')));});
  });
}
